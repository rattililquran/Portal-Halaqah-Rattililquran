<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testing Checklist — Portal Halaqah Rattililqur'an</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --text-2: #374151;
    --text-3: #6b7280;
    --admin: #7c3aed;
    --admin-l: #f3f0ff;
    --guru: #0ea5e9;
    --guru-l: #f0f9ff;
    --murid: #16a34a;
    --murid-l: #f0fdf4;
    --red: #dc2626;
    --red-l: #fef2f2;
    --green: #16a34a;
    --green-l: #f0fdf4;
    --amber: #d97706;
    --amber-l: #fffbeb;
    --gray-l: #f3f4f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* ── HEADER ── */
  .header { background: #fff; border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .header-left h1 { font-size: 17px; font-weight: 800; }
  .header-left p  { font-size: 11px; color: var(--text-3); margin-top: 1px; }
  .header-right { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* ── TOTAL BAR ── */
  .total-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .total-group { display: flex; align-items: center; gap: 6px; }
  .total-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .total-label { font-size: 11px; font-weight: 700; color: var(--text-3); }
  .total-num { font-size: 15px; font-weight: 800; }
  .divider { width: 1px; height: 20px; background: var(--border); }
  .progress-wrap { flex: 1; min-width: 100px; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; display: flex; gap: 1px; }
  .progress-pass { height: 100%; background: #16a34a; transition: width .4s; }
  .progress-fail { height: 100%; background: #dc2626; transition: width .4s; }

  /* ── PORTAL CARD ── */
  .portal-card { border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); border: 1px solid var(--border); background: var(--card); }
  .portal-header { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
  .portal-header.admin { background: var(--admin-l); border-bottom: 2px solid var(--admin); }
  .portal-header.guru  { background: var(--guru-l);  border-bottom: 2px solid var(--guru);  }
  .portal-header.murid { background: var(--murid-l); border-bottom: 2px solid var(--murid); }
  .portal-title { display: flex; align-items: center; gap: 10px; }
  .portal-icon { font-size: 22px; }
  .portal-name { font-size: 15px; font-weight: 800; }
  .portal-name.admin { color: var(--admin); }
  .portal-name.guru  { color: var(--guru);  }
  .portal-name.murid { color: var(--murid); }
  .portal-stats { display: flex; gap: 8px; align-items: center; font-size: 12px; font-weight: 700; }
  .ps-pass { color: var(--green); }
  .ps-fail { color: var(--red); }
  .ps-todo { color: var(--text-3); }

  /* ── SECTION ── */
  .section { border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }
  .section-header { padding: 11px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; background: #fafafa; transition: background .15s; }
  .section-header:hover { background: #f3f4f6; }
  .section-title { font-size: 12.5px; font-weight: 700; color: var(--text-2); display: flex; align-items: center; gap: 7px; }
  .section-title .ico { font-size: 15px; }
  .sec-right { display: flex; align-items: center; gap: 8px; }
  .sec-pill { padding: 3px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; }
  .sec-pill.all-pass  { background: var(--green-l); color: var(--green); }
  .sec-pill.has-fail  { background: var(--red-l);   color: var(--red);   }
  .sec-pill.partial   { background: var(--amber-l); color: var(--amber); }
  .sec-pill.untouched { background: var(--gray-l);  color: var(--text-3);}
  .chevron { font-size: 11px; color: var(--text-3); transition: transform .2s; }
  .chevron.open { transform: rotate(180deg); }

  /* ── ITEMS ── */
  .items-list { display: none; }
  .items-list.open { display: block; }

  .item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 18px; border-bottom: 1px solid #f3f4f6; transition: background .15s; }
  .item:last-child { border-bottom: none; }
  .item.pass { background: #f0fdf4; }
  .item.fail { background: #fef2f2; }

  .item-text { flex: 1; font-size: 13px; color: var(--text-2); line-height: 1.5; padding-top: 2px; }
  .item.pass .item-text { color: var(--green); }
  .item.fail .item-text { color: var(--red); text-decoration: line-through; opacity: .75; }

  /* toggle buttons */
  .btns { display: flex; gap: 4px; flex-shrink: 0; margin-top: 1px; }
  .btn-toggle { padding: 4px 9px; border-radius: 6px; font-size: 11.5px; font-weight: 700; border: 1.5px solid var(--border); background: #fff; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .btn-toggle.pass-btn       { color: var(--text-3); }
  .btn-toggle.pass-btn.active{ background: var(--green); color: #fff; border-color: var(--green); }
  .btn-toggle.fail-btn       { color: var(--text-3); }
  .btn-toggle.fail-btn.active{ background: var(--red);   color: #fff; border-color: var(--red);   }
  .btn-toggle:hover { opacity: .8; }

  /* ── BUTTONS ── */
  .btn { padding: 7px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-reset  { background: #fee2e2; color: var(--red); }
  .btn-print  { background: var(--text); color: #fff; }
  .btn-expand { background: var(--border); color: var(--text-2); font-size: 11px; }

  .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; }

  /* ── PRINT ── */
  @media print {
    .header { position: static; }
    .header-right { display: none; }
    .total-bar { flex-wrap: nowrap; }
    .items-list { display: block !important; }
    .chevron { display: none; }
    .section-header { cursor: default; background: #f9f9f9 !important; }
    .btns { display: none; }
    .item.pass::after { content: '✅'; font-size: 13px; }
    .item.fail::after { content: '❌'; font-size: 13px; }
    body { background: #fff; }
    .container { padding: 8px; }
    .portal-card { break-inside: avoid; page-break-inside: avoid; }
  }

  @media (max-width: 600px) {
    .header { padding: 12px 14px; }
    .total-bar { padding: 8px 14px; gap: 10px; }
    .item { padding: 8px 14px; gap: 8px; }
    .btns { flex-direction: column; gap: 3px; }
    .btn-toggle { font-size: 11px; padding: 3px 7px; }
  }
</style>
</head>

        { id:'m37', text:'Data KBM dan At-Tibyan di raport sesuai riwayat' },
        { id:'m38', text:'Download PDF → file ter-download dengan semua halaman lengkap' },
      ]},
      { id:'mrd_notif', title:'Push Notifikasi & PWA', icon:'🔔', items:[
        { id:'m39', text:'Halaman Notifikasi: tombol aktifkan muncul jika belum subscribe' },
        { id:'m40', text:'Klik aktifkan → izin browser → status berubah "Aktif"' },
        { id:'m41', text:'Murid alpa → menerima push notifikasi setelah guru tutup KBM' },
        { id:'m42', text:'Tap notifikasi → membuka portal murid di halaman yang tepat' },
        { id:'m43', text:'Halaman Panduan Instalasi: langkah Android/iPhone tampil jelas' },
        { id:'m44', text:'Pasang PWA → ikon di homescreen, buka full-screen tanpa browser bar' },
        { id:'m45', text:'Tombol YouTube di panduan → buka channel @rattililquran01' },
      ]},
    ]
  }
];

// ══════════════════════════════════════════════════════════
//  STATE  (localStorage)
//  nilai: null = belum, 'pass' = berhasil, 'fail' = gagal
// ══════════════════════════════════════════════════════════
var STORE_KEY = 'rattil_checklist_v2';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  var t = new Date();
  document.getElementById('lastSaved').textContent =
    'Tersimpan: ' + t.toLocaleDateString('id-ID') + ' ' + t.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
}

var state = loadState();

// ══════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════
function render() {
  var app = document.getElementById('app');
  app.innerHTML = '';
  DATA.forEach(function(portal) {
    var card = document.createElement('div');
    card.className = 'portal-card';

    // portal stats
    var pt=0, pp=0, pf=0;
    portal.sections.forEach(function(s){ s.items.forEach(function(i){ pt++; var v=state[i.id]; if(v==='pass')pp++; else if(v==='fail')pf++; }); });

    var hdr = document.createElement('div');
    hdr.className = 'portal-header ' + portal.color;
    hdr.innerHTML = '<div class="portal-title">'
      + '<span class="portal-icon">' + portal.icon + '</span>'
      + '<div><div class="portal-name ' + portal.color + '">Portal ' + portal.role + '</div>'
      + '<div style="font-size:11px;color:var(--text-3);margin-top:1px">' + pt + ' item test</div>'
      + '</div></div>'
      + '<div class="portal-stats">'
      + '<span class="ps-pass">✅ ' + pp + '</span>'
      + '<span class="ps-fail">❌ ' + pf + '</span>'
      + '<span class="ps-todo">— ' + (pt-pp-pf) + '</span>'
      + '</div>';
    card.appendChild(hdr);

    portal.sections.forEach(function(sec) {
      var st=sec.items.length, sp=0, sf=0;
      sec.items.forEach(function(i){ var v=state[i.id]; if(v==='pass')sp++; else if(v==='fail')sf++; });
      var pillCls = sp===st?'all-pass': sf>0&&sp===0?'has-fail': sf>0||sp>0?'partial':'untouched';
      var pillTxt = sp===st&&sf===0 ? '✓ Semua berhasil'
                  : sp>0||sf>0 ? '✅'+sp+' ❌'+sf+' / '+st
                  : '–';
      var openKey = 'o_' + sec.id;
      var isOpen  = state[openKey] !== false;

      var secEl = document.createElement('div');
      secEl.className = 'section';
      secEl.id = 'sec_' + sec.id;

      var sHdr = document.createElement('div');
      sHdr.className = 'section-header';
      sHdr.innerHTML = '<div class="section-title"><span class="ico">' + sec.icon + '</span>' + sec.title + '</div>'
        + '<div class="sec-right"><span class="sec-pill ' + pillCls + '">' + pillTxt + '</span>'
        + '<span class="chevron' + (isOpen?' open':'') + '">▼</span></div>';
      sHdr.addEventListener('click', function() {
        var list = secEl.querySelector('.items-list');
        var chev = sHdr.querySelector('.chevron');
        var now = list.classList.toggle('open');
        chev.classList.toggle('open', now);
        state[openKey] = now;
        saveState();
      });
      secEl.appendChild(sHdr);

      var list = document.createElement('div');
      list.className = 'items-list' + (isOpen ? ' open' : '');

      sec.items.forEach(function(item) {
        var val = state[item.id] || null;
        var row = document.createElement('div');
        row.className = 'item' + (val==='pass'?' pass': val==='fail'?' fail':'');
        row.id = 'row_' + item.id;

        var txt = document.createElement('div');
        txt.className = 'item-text';
        txt.textContent = item.text;

        var btns = document.createElement('div');
        btns.className = 'btns';

        var btnP = document.createElement('button');
        btnP.className = 'btn-toggle pass-btn' + (val==='pass'?' active':'');
        btnP.textContent = '✅ Berhasil';

        var btnF = document.createElement('button');
        btnF.className = 'btn-toggle fail-btn' + (val==='fail'?' active':'');
        btnF.textContent = '❌ Gagal';

        btnP.addEventListener('click', function() {
          var newVal = state[item.id]==='pass' ? null : 'pass';
          state[item.id] = newVal;
          saveState();
          refreshRow(row, item.id, btns, btnP, btnF);
          updateProgress();
          updateSection(sec, secEl);
          updatePortal(portal, hdr);
        });
        btnF.addEventListener('click', function() {
          var newVal = state[item.id]==='fail' ? null : 'fail';
          state[item.id] = newVal;
          saveState();
          refreshRow(row, item.id, btns, btnP, btnF);
          updateProgress();
          updateSection(sec, secEl);
          updatePortal(portal, hdr);
        });

        btns.appendChild(btnP);
        btns.appendChild(btnF);
        row.appendChild(txt);
        row.appendChild(btns);
        list.appendChild(row);
      });

      secEl.appendChild(list);
      card.appendChild(secEl);
    });

    app.appendChild(card);
  });
  updateProgress();
}

function refreshRow(row, id, btnsEl, btnP, btnF) {
  var val = state[id] || null;
  row.className = 'item' + (val==='pass'?' pass': val==='fail'?' fail':'');
  btnP.className = 'btn-toggle pass-btn' + (val==='pass'?' active':'');
  btnF.className = 'btn-toggle fail-btn' + (val==='fail'?' active':'');
}

function updateSection(sec, secEl) {
  var st=sec.items.length, sp=0, sf=0;
  sec.items.forEach(function(i){ var v=state[i.id]; if(v==='pass')sp++; else if(v==='fail')sf++; });
  var pillCls = sp===st&&sf===0?'all-pass': sf>0&&sp+sf===st?'has-fail': sf>0||sp>0?'partial':'untouched';
  var pillTxt = sp===st&&sf===0?'✓ Semua berhasil': sp>0||sf>0?'✅'+sp+' ❌'+sf+' / '+st:'–';
  var pill = secEl.querySelector('.sec-pill');
  if (pill) { pill.className='sec-pill '+pillCls; pill.textContent=pillTxt; }
}

function updatePortal(portal, hdr) {
  var pt=0,pp=0,pf=0;
  portal.sections.forEach(function(s){ s.items.forEach(function(i){ pt++; var v=state[i.id]; if(v==='pass')pp++; else if(v==='fail')pf++; }); });
  var stats = hdr.querySelector('.portal-stats');
  if (stats) stats.innerHTML = '<span class="ps-pass">✅ '+pp+'</span><span class="ps-fail">❌ '+pf+'</span><span class="ps-todo">— '+(pt-pp-pf)+'</span>';
}

function updateProgress() {
  var total=0, pass=0, fail=0;
  DATA.forEach(function(p){ p.sections.forEach(function(s){ s.items.forEach(function(i){ total++; var v=state[i.id]; if(v==='pass')pass++; else if(v==='fail')fail++; }); }); });
  var todo = total - pass - fail;
  document.getElementById('cntPass').textContent = pass;
  document.getElementById('cntFail').textContent = fail;
  document.getElementById('cntTodo').textContent = todo;
  document.getElementById('totalFrac').textContent = (pass+fail) + ' / ' + total + ' ditest';
  document.getElementById('barPass').style.width = (total?pass/total*100:0)+'%';
  document.getElementById('barFail').style.width = (total?fail/total*100:0)+'%';
}

function toggleAll(open) {
  DATA.forEach(function(p){ p.sections.forEach(function(s){ state['o_'+s.id]=open; }); });
  saveState();
  render();
}

function resetAll() {
  if (!confirm('Reset semua hasil test? Data tidak bisa dikembalikan.')) return;
  var openKeys = {};
  Object.keys(state).forEach(function(k){ if(k.startsWith('o_')) openKeys[k]=state[k]; });
  state = openKeys;
  saveState();
  render();
}

// ── INIT ──────────────────────────────────────────────────
render();
</script>
</body>
</html>
